<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Norx AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080a0e;--bg2:#0d1017;--bg3:#131720;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#eef0f4;--text2:#7c8494;--text3:#3d4556;--accent:#00d4ff;--accent-dim:rgba(0,212,255,0.08);--accent-border:rgba(0,212,255,0.2);--green:#00e5a0;--danger:#ff5f5f;--r:8px;--r-lg:12px;--r-xl:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;text-decoration:none}
.logo-mark{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-0.3px;color:var(--text)}
.logo-text span{color:var(--accent)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);padding:36px;width:100%;max-width:400px}
.card-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
input{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
.btn-full{width:100%;padding:13px;font-size:14px;font-weight:700;border-radius:var(--r-lg);border:none;cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-primary-full{background:var(--accent);color:var(--bg)}
.btn-primary-full:hover{background:#00b8db}
.btn-primary-full:disabled{opacity:0.6;cursor:not-allowed}
.forgot{font-size:12px;color:var(--text3);text-align:right;margin-top:-8px;margin-bottom:16px}
.forgot a{color:var(--text2);text-decoration:none}
.forgot a:hover{color:var(--accent)}
.signup-link{text-align:center;font-size:13px;color:var(--text2);margin-top:20px}
.signup-link a{color:var(--accent);font-weight:600;text-decoration:none}
.form-error{background:rgba(255,95,95,0.1);border:1px solid rgba(255,95,95,0.25);border-radius:var(--r);padding:10px 13px;font-size:13px;color:var(--danger);margin-bottom:14px;display:none}
.loading-spinner{width:16px;height:16px;border:2px solid rgba(8,10,14,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin 0.7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>

<a href="/" class="logo">
  <div class="logo-mark"><svg viewBox="0 0 18 18" fill="none"><path d="M3 9l4 4 8-8" stroke="#080a0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="logo-text">Norx<span> AI</span></div>
</a>

<div class="card">
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Log in to your Norx AI account</div>

  <div class="form-error" id="form-error"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" id="email" placeholder="you@youragency.com" autocomplete="email" onkeydown="if(event.key==='Enter')handleLogin()">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" id="password" placeholder="Your password" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
  </div>
  <div class="forgot"><a href="/forgot">Forgot password?</a></div>

  <button class="btn-full btn-primary-full" id="login-btn" onclick="handleLogin()">
    <div class="loading-spinner" id="spinner"></div>
    <span id="btn-text">Log in →</span>
  </button>

  <div class="signup-link">Don't have an account? <a href="/signup">Start free trial</a></div>
</div>

<script>
const SUPABASE_URL = 'https://eyofcybilytepouerssp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5b2ZjeWJpbHl0ZXBvdWVyc3NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODk3MDMsImV4cCI6MjA5MTM2NTcwM30.6Kj2I5guyQFaBW3EryWMeWGzbmitMfBCRdTMXzBR3ZE';

async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  const errorEl = document.getElementById('form-error');

  errorEl.style.display = 'none';
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Logging in...';

  try {
    const resp = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password }),
    });
    const data = await resp.json();

    if (data.error || !data.access_token) {
      showError(data.error_description || data.error || 'Invalid email or password.');
      resetBtn();
      return;
    }

    // Store auth tokens
    localStorage.setItem('norx-auth-token', data.access_token);
    localStorage.setItem('norx-refresh-token', data.refresh_token);
    localStorage.setItem('norx-user-id', data.user?.id || '');
    localStorage.setItem('norx-user-email', data.user?.email || '');
    localStorage.setItem('norx-user-meta', JSON.stringify(data.user?.user_metadata || {}));

    btnText.textContent = 'Logged in! Redirecting...';
    window.location.href = '/app';

  } catch(err) {
    showError('Connection error. Please check your internet and try again.');
    resetBtn();
  }
}

function showError(msg) {
  const el = document.getElementById('form-error');
  el.textContent = msg;
  el.style.display = 'block';
}
function resetBtn() {
  document.getElementById('login-btn').disabled = false;
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btn-text').textContent = 'Log in →';
}

// Auto-redirect if already logged in
if (localStorage.getItem('norx-auth-token')) {
  window.location.href = '/app';
}
</script>
</body>
</html>
